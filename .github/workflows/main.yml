name: Extract ZIP to Root

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Extract ZIP into root
        run: unzip -o Kendare_decompiled.zip -d .

      - name: Show files
        run: ls -R
