name: Extract ZIP to Root and Push

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# වැදගත්: Workflow එකට repository එකට write කිරීමේ අවසරය ලබා දෙන්න
permissions:
  contents: write

jobs:
  unzip-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Extract ZIP into root
        run: unzip -o Kendare_decompiled.zip -d .

      - name: Show extracted files (for logging)
        run: ls -R

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "🤖 Automated: Extract Kendare_decompiled.zip" || echo "✅ No changes to commit"
          git push
